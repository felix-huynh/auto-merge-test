name: AI Code Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull Request number to review"
        required: true
        type: number

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid,baseRefOid)
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .baseRefOid)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Install Cursor CLI
        run: curl https://cursor.com/install -fsS | bash

      - name: Perform code review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "auto"
        run: |
          agent --force --model "$MODEL" --output-format=text --print "You are operating in a GitHub Actions runner performing automated code review. The gh CLI is available and authenticated via GH_TOKEN. You may comment on pull requests.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: ${{ inputs.pr_number }}
          - PR Head SHA: ${{ steps.pr.outputs.head_sha }}
          - PR Base SHA: ${{ steps.pr.outputs.base_sha }}

          Objectives:
          1) Re-check existing review comments and reply resolved when addressed
          2) Review the current PR diff and flag only clear, high-severity issues
          3) Leave very short inline comments (1-2 sentences) on changed lines only and a brief summary at the end

          Procedure:
          - Get existing comments: gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json comments
          - Get diff: gh pr diff ${{ inputs.pr_number }} --repo ${{ github.repository }}
          - If a previously reported issue appears fixed by nearby changes, reply: ✅ This issue appears to be resolved by the recent changes
          - Avoid duplicates: skip if similar feedback already exists on or near the same lines

          Commenting rules:
          - Max 10 inline comments total; prioritize the most critical issues
          - One issue per comment; place on the exact changed line
          - Natural tone, specific and actionable; do not mention automated or high-confidence
          - Use emojis: 🚨 Critical 🔒 Security ⚡ Performance ⚠️ Logic ✅ Resolved ✨ Improvement

          Submission:
          - Submit one review containing inline comments plus a concise summary
          - Use only: gh pr review ${{ inputs.pr_number }} --repo ${{ github.repository }} --comment
          - Do not use: gh pr review --approve or --request-changes"
