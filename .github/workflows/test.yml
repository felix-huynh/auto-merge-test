name: Cursor AI Reviews (Manual)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number to review"
        required: true
        type: number
      run_code_review:
        description: "Run Code Review"
        required: false
        type: boolean
        default: true
      run_security_review:
        description: "Run Security Review"
        required: false
        type: boolean
        default: true
      run_document_generator:
        description: "Run Document Generator"
        required: false
        type: boolean
        default: true

jobs:
  code-review:
    name: Code Review
    if: ${{ inputs.run_code_review }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid,baseRefOid)
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .baseRefOid)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Install Cursor CLI
        run: curl https://cursor.com/install -fsS | bash

      - name: Perform code review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "auto"
        run: |
          agent --force --model "$MODEL" --output-format=text --print "You are operating in a GitHub Actions runner performing automated code review. The gh CLI is available and authenticated via GH_TOKEN. You may comment on pull requests.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: ${{ inputs.pr_number }}
          - PR Head SHA: ${{ steps.pr.outputs.head_sha }}
          - PR Base SHA: ${{ steps.pr.outputs.base_sha }}

          Objectives:
          1) Re-check existing review comments and reply resolved when addressed
          2) Review the current PR diff and flag only clear, high-severity issues
          3) Leave very short inline comments (1-2 sentences) on changed lines only and a brief summary at the end

          Procedure:
          - Get existing comments: gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json comments
          - Get diff: gh pr diff ${{ inputs.pr_number }} --repo ${{ github.repository }}
          - If a previously reported issue appears fixed by nearby changes, reply: ✅ This issue appears to be resolved by the recent changes
          - Avoid duplicates: skip if similar feedback already exists on or near the same lines

          Commenting rules:
          - Max 10 inline comments total; prioritize the most critical issues
          - One issue per comment; place on the exact changed line
          - Natural tone, specific and actionable; do not mention automated or high-confidence
          - Use emojis: 🚨 Critical 🔒 Security ⚡ Performance ⚠️ Logic ✅ Resolved ✨ Improvement

          Submission:
          - Submit one review containing inline comments plus a concise summary
          - Use only: gh pr review ${{ inputs.pr_number }} --repo ${{ github.repository }} --comment
          - Do not use: gh pr review --approve or --request-changes"

  security-review:
    name: Security Review
    if: ${{ inputs.run_security_review }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid,baseRefOid)
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .baseRefOid)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Install Cursor CLI
        run: curl https://cursor.com/install -fsS | bash

      - name: Perform security review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "auto"
        run: |
          agent --force --model "$MODEL" --output-format=text --print "You are a security-focused code reviewer operating in a GitHub Actions runner. The gh CLI is available and authenticated via GH_TOKEN. You may comment on pull requests.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: ${{ inputs.pr_number }}
          - PR Head SHA: ${{ steps.pr.outputs.head_sha }}
          - PR Base SHA: ${{ steps.pr.outputs.base_sha }}

          Objectives:
          1) Perform a thorough security audit of the PR diff
          2) Check the full codebase for security patterns related to the changed files
          3) Flag vulnerabilities with clear severity and remediation steps

          Security checklist:
          - Hardcoded secrets, API keys, tokens, or credentials
          - SQL/NoSQL injection vulnerabilities
          - Cross-site scripting (XSS) and cross-site request forgery (CSRF)
          - Insecure authentication or authorization patterns
          - Missing input validation or sanitization
          - Insecure deserialization
          - Path traversal or file inclusion vulnerabilities
          - Sensitive data exposure in logs, errors, or responses
          - Insecure dependencies or outdated packages with known CVEs
          - Missing rate limiting or abuse prevention
          - Improper error handling leaking internal details
          - Insecure cryptographic usage

          Procedure:
          - Get diff: gh pr diff ${{ inputs.pr_number }} --repo ${{ github.repository }}
          - Read changed files fully to understand context beyond the diff
          - Check package.json / lock files for dependency vulnerabilities if changed
          - Check .env.example and config files for sensitive patterns

          Commenting rules:
          - Max 10 inline comments total; prioritize by severity
          - One vulnerability per comment; place on the exact line
          - Include severity level (Critical/High/Medium/Low) and a suggested fix
          - Use emojis: 🚨 Critical 🔒 High 🛡️ Medium ℹ️ Low ✅ Good practice noted

          Submission:
          - Submit one review containing inline comments plus a security summary
          - Use only: gh pr review ${{ inputs.pr_number }} --repo ${{ github.repository }} --comment
          - Do not use: gh pr review --approve or --request-changes"

  document-generator:
    name: Document Generator
    if: ${{ inputs.run_document_generator }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid,baseRefOid)
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .baseRefOid)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Install Cursor CLI
        run: curl https://cursor.com/install -fsS | bash

      - name: Generate documentation
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "auto"
        run: |
          agent --force --model "$MODEL" --output-format=text --print "You are a documentation generator operating in a GitHub Actions runner. The gh CLI is available and authenticated via GH_TOKEN. You may comment on pull requests.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: ${{ inputs.pr_number }}
          - PR Head SHA: ${{ steps.pr.outputs.head_sha }}
          - PR Base SHA: ${{ steps.pr.outputs.base_sha }}

          Objectives:
          1) Analyze the PR diff and changed files to understand what was added or modified
          2) Generate clear, structured documentation for the changes
          3) Post the documentation as a PR comment

          Procedure:
          - Get PR info: gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json title,body,files
          - Get diff: gh pr diff ${{ inputs.pr_number }} --repo ${{ github.repository }}
          - Read the changed files fully to understand functionality
          - Check existing docs/ folder and README for context on documentation style

          Documentation to generate:
          - Summary of what the PR changes or introduces
          - For new APIs/endpoints: method, path, request/response schema, auth requirements, example usage
          - For new services/modules: purpose, dependencies, configuration, public methods
          - For database changes: schema changes, migrations, impact on existing data
          - For config changes: new environment variables, required values, defaults
          - For bug fixes: what was broken, root cause, how it was fixed

          Format:
          - Use clean markdown with headers, tables, and code blocks
          - Keep it concise but complete
          - Include code examples where helpful
          - Structure: Overview > Details > Configuration > Usage Examples

          Submission:
          - Post as a single PR comment using: gh pr comment ${{ inputs.pr_number }} --repo ${{ github.repository }} --body <documentation>
          - Prefix the comment with: 📝 **Auto-Generated Documentation**
          - Do not use: gh pr review"
