name: AI Document Generator

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull Request number to review"
        required: true
        type: number

jobs:
  document-generator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefOid,baseRefOid)
          echo "head_sha=$(echo "$PR_JSON" | jq -r .headRefOid)" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(echo "$PR_JSON" | jq -r .baseRefOid)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Install Cursor CLI
        run: curl https://cursor.com/install -fsS | bash

      - name: Generate documentation
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "auto"
        run: |
          agent --force --model "$MODEL" --output-format=text --print "You are a documentation generator operating in a GitHub Actions runner. The gh CLI is available and authenticated via GH_TOKEN. You may comment on pull requests.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: ${{ inputs.pr_number }}
          - PR Head SHA: ${{ steps.pr.outputs.head_sha }}
          - PR Base SHA: ${{ steps.pr.outputs.base_sha }}

          Objectives:
          1) Analyze the PR diff and changed files to understand what was added or modified
          2) Generate clear, structured documentation for the changes
          3) Post the documentation as a PR comment

          Procedure:
          - Get PR info: gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json title,body,files
          - Get diff: gh pr diff ${{ inputs.pr_number }} --repo ${{ github.repository }}
          - Read the changed files fully to understand functionality
          - Check existing docs/ folder and README for context on documentation style

          Documentation to generate:
          - Summary of what the PR changes or introduces
          - For new APIs/endpoints: method, path, request/response schema, auth requirements, example usage
          - For new services/modules: purpose, dependencies, configuration, public methods
          - For database changes: schema changes, migrations, impact on existing data
          - For config changes: new environment variables, required values, defaults
          - For bug fixes: what was broken, root cause, how it was fixed

          Format:
          - Use clean markdown with headers, tables, and code blocks
          - Keep it concise but complete
          - Include code examples where helpful
          - Structure: Overview > Details > Configuration > Usage Examples

          Submission:
          - Post as a single PR comment using: gh pr comment ${{ inputs.pr_number }} --repo ${{ github.repository }} --body <documentation>
          - Prefix the comment with: 📝 **Auto-Generated Documentation**
          - Do not use: gh pr review"
